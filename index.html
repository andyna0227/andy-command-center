<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mission Control · Agent HQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #0a0a0a;
        --card: #111111;
        --border: #1a1a1a;
        --muted: #7c7f8a;
        --accent: #00ff88;
        --purple: #c084fc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 20% 20%, rgba(0, 255, 136, 0.05), transparent 40%),
          radial-gradient(circle at 80% 0%, rgba(192, 132, 252, 0.07), transparent 45%),
          var(--bg);
        color: #f8fafc;
      }

      .page {
        padding: clamp(1.5rem, 4vw, 3rem) clamp(1.25rem, 5vw, 4rem) 4rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      header.hero {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding-bottom: 1.5rem;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(2.5rem, 4vw, 3.25rem);
        letter-spacing: 0.18em;
      }

      .hero h1 span {
        color: var(--accent);
      }

      .hero p {
        margin: 0.25rem 0 0;
        font-size: 1rem;
        color: var(--muted);
      }

      .hero-controls {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.75rem;
        min-width: 210px;
      }

      .timestamp {
        font-size: 0.9rem;
        color: var(--muted);
      }

      button.refresh {
        padding: 0.65rem 1.75rem;
        border-radius: 999px;
        border: 1px solid rgba(0, 255, 136, 0.5);
        background: linear-gradient(120deg, rgba(0, 255, 136, 0.12), rgba(192, 132, 252, 0.12));
        color: #f8fafc;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      button.refresh:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 30px rgba(0, 255, 136, 0.25);
      }

      main {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      section {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .section-title {
        font-size: 0.9rem;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.65);
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1.25rem;
      }

      .card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.01), rgba(0, 0, 0, 0.4)), var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 1.5rem;
        position: relative;
        overflow: hidden;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px solid rgba(255, 255, 255, 0.03);
        pointer-events: none;
      }

      .agent-card {
        padding: 1.75rem;
        min-height: 220px;
      }

      .agent-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .agent-identity {
        display: flex;
        gap: 0.85rem;
        align-items: center;
      }

      .agent-emoji {
        font-size: 2rem;
      }

      .agent-text h3 {
        margin: 0;
        font-size: 1.25rem;
      }

      .agent-text span {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .badge-model {
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        background: rgba(192, 132, 252, 0.15);
        border: 1px solid rgba(192, 132, 252, 0.5);
        color: var(--purple);
      }

      .status-pill {
        padding: 0.35rem 0.9rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .status-pill.active {
        color: #051b12;
        background: radial-gradient(circle, rgba(0, 255, 136, 0.9), rgba(0, 255, 136, 0.55));
        box-shadow: 0 0 15px rgba(0, 255, 136, 0.45);
      }

      .status-pill.idle {
        color: rgba(255, 255, 255, 0.7);
        background: rgba(255, 255, 255, 0.06);
      }

      .agent-body {
        margin-top: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        font-size: 0.95rem;
      }

      .label {
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.3em;
        color: rgba(255, 255, 255, 0.45);
      }

      .value {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.85);
      }

      .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
      }

      .project-card h3 {
        margin: 0 0 0.35rem;
        font-size: 1.1rem;
      }

      .project-card h3 a {
        color: inherit;
        text-decoration: none;
      }

      .project-card h3 a:hover {
        color: var(--accent);
      }

      .project-card p {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .project-status {
        margin-top: 0.8rem;
        font-size: 0.85rem;
        color: var(--accent);
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .spend-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
      }

      .spend-card h4 {
        margin: 0;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 0.18em;
      }

      .spend-card .amount {
        margin-top: 0.5rem;
        font-size: 1.6rem;
        font-weight: 600;
      }

      .spend-card small {
        color: var(--muted);
      }

      table.cron-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }

      table.cron-table th,
      table.cron-table td {
        padding: 0.85rem 0.35rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      table.cron-table th {
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.55);
      }

      .cron-status {
        color: var(--accent);
        font-weight: 600;
        letter-spacing: 0.2em;
      }

      @media (max-width: 640px) {
        .hero-controls {
          width: 100%;
          align-items: flex-start;
        }
        .agent-card {
          padding: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div>
          <h1>MISSION <span>CONTROL</span></h1>
          <p>SEVENCUBED Operations — live Agent HQ overview</p>
        </div>
        <div class="hero-controls">
          <button class="refresh" id="refreshBtn">Refresh</button>
          <div class="timestamp">Last updated <span id="updatedAt">—</span></div>
        </div>
      </header>

      <main>
        <section>
          <div class="section-title">Agent Roster</div>
          <div class="card-grid roster" id="agentGrid"></div>
        </section>

        <section>
          <div class="section-title">Active Projects</div>
          <div class="projects-grid" id="projectsGrid"></div>
        </section>

        <section>
          <div class="section-title">Spend Overview</div>
          <div class="spend-grid" id="spendGrid"></div>
        </section>

        <section>
          <div class="section-title">Cron Jobs</div>
          <div class="card">
            <table class="cron-table" id="cronTable">
              <thead>
                <tr>
                  <th>Task</th>
                  <th>Schedule</th>
                  <th>Last Run</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script>
      const formatCurrency = (value) =>
        typeof value === "number"
          ? `$${value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
          : "—";

      const formatDateTime = (value) => {
        if (!value) return "—";
        try {
          return new Date(value).toLocaleString();
        } catch (err) {
          return value;
        }
      };

      const createAgentCard = (agent) => {
        const card = document.createElement("article");
        card.className = "card agent-card";
        card.innerHTML = `
          <div class="agent-header">
            <div class="agent-identity">
              <div class="agent-emoji">${agent.emoji || ""}</div>
              <div class="agent-text">
                <h3>${agent.name || ""}</h3>
                <span>${agent.role || ""}</span>
              </div>
            </div>
            <div class="badge-model">${agent.model || ""}</div>
          </div>
          <div class="agent-body">
            <div class="status-pill ${agent.status === "active" ? "active" : "idle"}">
              ${agent.status || "idle"}
            </div>
            <div>
              <div class="label">Last Task</div>
              <div class="value">${agent.lastTask || "—"}</div>
            </div>
            <div>
              <div class="label">Session Cost</div>
              <div class="value">${formatCurrency(agent.sessionCost)}</div>
            </div>
          </div>
        `;
        return card;
      };

      const renderAgents = (agents = []) => {
        const grid = document.getElementById("agentGrid");
        grid.innerHTML = "";
        agents.forEach((agent) => grid.appendChild(createAgentCard(agent)));
      };

      const renderProjects = (projects = []) => {
        const grid = document.getElementById("projectsGrid");
        grid.innerHTML = "";
        projects.forEach((project) => {
          const card = document.createElement("article");
          card.className = "card project-card";
          const statusLabel = project.status?.replace("_", " ") || "";
          card.innerHTML = `
            <h3>${project.url ? `<a href="${project.url}" target="_blank" rel="noreferrer">${project.name}</a>` : project.name}</h3>
            <p>${project.description || ""}</p>
            <div class="project-status">${statusLabel}</div>
          `;
          grid.appendChild(card);
        });
      };

      const renderSpend = (data) => {
        const items = [
          {
            label: "Railway",
            amount: formatCurrency(data?.railway?.monthSpendUsd),
            sub: "Month spend"
          },
          {
            label: "DataForSEO",
            amount:
              data?.dataforseo?.balance != null
                ? `${formatCurrency(data.dataforseo.balance)} ${data.dataforseo.currency || "USD"}`
                : "—",
            sub: "Balance"
          },
          {
            label: "OpenClaw",
            amount: formatCurrency(data?.openclaw?.todayCostUsd),
            sub: "Today"
          }
        ];
        const grid = document.getElementById("spendGrid");
        grid.innerHTML = "";
        items.forEach((item) => {
          const card = document.createElement("article");
          card.className = "card spend-card";
          card.innerHTML = `
            <h4>${item.label}</h4>
            <div class="amount">${item.amount}</div>
            <small>${item.sub}</small>
          `;
          grid.appendChild(card);
        });
      };

      const renderCrons = (crons = []) => {
        const body = document.querySelector("#cronTable tbody");
        body.innerHTML = "";
        crons.forEach((cron) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${cron.name || ""}</td>
            <td>${cron.schedule || ""}</td>
            <td>${cron.lastRun || ""}</td>
            <td class="cron-status">${cron.status || ""}</td>
          `;
          body.appendChild(row);
        });
      };

      async function loadDashboard() {
        try {
          const response = await fetch(`data.json?_=${Date.now()}`);
          if (!response.ok) throw new Error("Failed to load data");
          const data = await response.json();
          document.getElementById("updatedAt").textContent = formatDateTime(data.updatedAt);
          renderAgents(data.agents || []);
          renderProjects(data.projects || []);
          renderSpend(data);
          renderCrons(data.crons || []);
        } catch (error) {
          console.error(error);
          alert("Unable to load Mission Control data.");
        }
      }

      document.getElementById("refreshBtn").addEventListener("click", loadDashboard);
      loadDashboard();
    </script>
  </body>
</html>
